<h2 id="title_page"></h2>
<div class="page" data-page="campaign-report">
  <div class="screen"></div>
  <ul id="contextMenu">
    <li id="editOption" style="padding: 5px; cursor: pointer">Edit</li>
    <li id="deleteOption" style="padding: 5px; cursor: pointer">Delete</li>
    <li id="moveUpOption" style="padding: 5px; cursor: pointer">Move Up</li>
    <li id="moveDownOption" style="padding: 5px; cursor: pointer">Move Down</li>
  </ul>
  <div class="chat">
    <textarea class="message" placeholder="Write your message..."></textarea>
    <div class="button_world">
      <img
        class="img_icon"
        src="/src/Images/Icons/Img icon.png"
        alt="Img icon"
      />
      <input type="file" id="imgInput" accept="image/*" style="display: none" />
      <button class="submit" type="submit">&#x25B6;</button>
    </div>
  </div>
</div>
