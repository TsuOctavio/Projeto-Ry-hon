<h2 id="title_page"></h2>
<div class="page" data-page="sheet">
  <div class="top_1">
    <label for="name">Name</label>
    <input class="name" type="text" />
    <label for="Religion">Religion</label>
    <input class="religion" type="text" />
  </div>
  <div class="top_2">
    <label for="race">Race</label>
    <input class="race" type="text" />
    <label for="class">Class</label>
    <input class="class" type="text" />
  </div>
  <div class="mid">
    <div class="True_attributes">
      <h2>Attributes</h2>
      <div class="flex">
        <div class="Attributes">
          <label for="str">Strength (STR)</label>
          <input class="str N" type="number" min="0" max="50" /> <br />
          <label for="dex N">Dexterity (DEX)</label>
          <input class="dex N" type="number" min="0" max="50" /> <br />
          <label for="con">Constitution (CON)</label>
          <input class="con N" type="number" min="0" max="50" /> <br />
          <label for="per">Perception (PER)</label>
          <input class="per N" type="number" min="0" max="50" /> <br />
          <label for="int">Intelligence (INT)</label>
          <input class="int N" type="number" min="0" max="50" /> <br />
          <label for="wil">Willpower (WIL)</label>
          <input class="wil N" type="number" min="0" max="50" /> <br />
          <label for="cha">Charisma (CHA)</label>
          <input class="cha N" type="number" min="0" max="50" />
        </div>
        <div class="Attributes_1">
          <label for="fai">Faith (FAI)</label>
          <input class="fai N" type="number" min="0" max="50" /> <br />
          <label for="mag">Magic (MAG)</label>
          <input class="mag N" type="number" min="0" max="50" /> <br />
          <label for="aur">Aura (AUR)</label>
          <input class="aur N" type="number" min="0" max="50" /> <br />
          <label for="karma">Karma</label>
          <input class="Karma N" type="number" min="-100" max="100" /> <br />
          <label for="Gold">Gold</label>
          <input class="Gold N" type="number" min="0" max="99999999999" />
          <br />
        </div>
      </div>
    </div>
    <div class="mid_1">
      <h2>Skills and techniques</h2>
      <ul class="skills">
        <li contenteditable="true">
          <span class="iten_name" contenteditable="true"></span>
        </li>
        <li contenteditable="true">
          <span class="iten_name" contenteditable="true"></span>
        </li>
        <li contenteditable="true">
          <span class="iten_name" contenteditable="true"></span>
        </li>
      </ul>
      <img
        class="more_skill"
        src="src/Images/Icons/+ symbol.png"
        alt="+ Symbol"
      />
    </div>
  </div>
  <div class="bottom">
    <div class="itens">
      <h2>Itens</h2>
      <ul class="iten_list">
        <li>
          <input
            class="N2"
            type="number"
            class="quantidade"
            value="2"
            min="0"
          />
          <span class="iten_name" contenteditable="true">Medical kit</span>
        </li>
        <li>
          <input
            class="N2"
            type="number"
            class="quantidade"
            value="1"
            min="0"
          />
          <span class="iten_name" contenteditable="true">Flashlight</span>
        </li>
      </ul>
      <img
        class="more_iten"
        src="src/Images/Icons/+ symbol.png"
        alt="+ Symbol"
      />
    </div>
    <div class="background_sheet">
      <h2>story</h2>
      <textarea class="story" placeholder="Write your message..."></textarea>
    </div>
  </div>
</div>
