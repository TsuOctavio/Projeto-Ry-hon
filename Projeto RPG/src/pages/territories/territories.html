<h2 id="title_page"></h2>
<div class="page" data-page="territories">
  <div id="Territory_attributes">
    <img src="src/Images/Icons/Food icon.png" alt="Food icon" />
    <input type="number" id="Food" />
    <img src="src/Images/Icons/Army Icon.png" alt="Army icon" />
    <input type="number" id="Army" />
    <img src="src/Images/Icons/Happiness Icon.png" alt="Happiness icon" />
    <input type="number" id="Happiness" />
    <img src="src/Images/Icons/Population Icon.jpg" alt="Population icon" />
    <input type="number" id="Population" />
    <img src="src/Images/Icons/Agriculture Icon.avif" alt="Agriculture icon" />
    <input type="number" id="Agriculture" />
    <img src="src/Images/Icons/Money Icon.jpg" alt="Money icon" />
    <input type="number" id="Money" />
    <img
      src="src/Images/Icons/Infrastructure Icon.png"
      alt="Infrastructure icon"
    />
    <input type="number" id="Infrastructure" />
    <img src="src/Images/Icons/Business Icon.png" alt="Business icon" />
    <input type="number" id="Business" />
  </div>
  <div id="Territories_main">
    <div id="Territories_left">
      <div id="Territories_ul">
        <ul id="Territories_description">
          <li>
            <img src="src/Images/Icons/Food icon.png" alt="Food icon" />
            Food
          </li>
          <li>
            <img src="src/Images/Icons/Army Icon.png" alt="Army icon" />
            Army
          </li>
          <li>
            <img
              src="src/Images/Icons/Happiness Icon.png"
              alt="Happiness icon"
            />
            Happiness
          </li>
          <li>
            <img
              src="src/Images/Icons/Population Icon.jpg"
              alt="Population icon"
            />
            Population
          </li>
          <li>
            <img
              src="src/Images/Icons/Agriculture Icon.avif"
              alt="Agriculture icon"
            />
            Agriculture
          </li>
          <li>
            <img src="src/Images/Icons/Money Icon.jpg" alt="Money icon" />
            Money
          </li>
          <li>
            <img
              src="src/Images/Icons/Infrastructure Icon.png"
              alt="Infrastructure icon"
            />
            Infrastructure
          </li>
          <li>
            <img src="src/Images/Icons/Business Icon.png" alt="Business icon" />
            Business
          </li>
        </ul>
      </div>
    </div>
    <div id="Territories_mid">
      <div id="Territory_specialty">
        <textarea
          class="specialty"
          placeholder="Territory Specialty, Description:, Effects:"
        ></textarea>
      </div>
      <div id="action">
        <h3>Event created</h3>
        <div id="Event_description">
          <div id="Name_description">
            <textarea
              class="Event_action"
              placeholder="2 Events you will do and their descriptions"
            ></textarea>
          </div>
          <div id="Event_effect">
            <p><strong>Event effects</strong></p>
            <label for="food">Food</label>
            <input type="number" />
            <label for="army">Army</label>
            <input type="number" />
            <label for="happiness">Happiness</label>
            <input type="number" />
            <label for="population">Population</label>
            <input type="number" />
            <label for="agriculture">Agriculture</label>
            <input type="number" />
            <label for="money">Money</label>
            <input type="number" />
            <label for="infrastructure">Infrastructure</label>
            <input type="number" />
            <label for="business">Business</label>
            <input type="number" />
          </div>
        </div>
      </div>
    </div>
    <div id="Territories_rigth">
      <button id="Random_events">2 Random events</button>
      <div class="Random_event"></div>
      <div class="Random_event"></div>
      <button id="Pass_turn">Pass turn</button>
    </div>
  </div>
</div>
